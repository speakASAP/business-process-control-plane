apiVersion: v1
kind: ConfigMap
metadata:
  name: business-process-control-plane-config
  namespace: statex-apps
  labels:
    app: business-process-control-plane
    managed-by: codex
    component: control-plane
data:
  NODE_ENV: "production"
  SERVICE_NAME: "business-process-control-plane"
  PORT: "3375"
  BPCP_SERVICE_ID: "business-process-control-plane"
  BPCP_DATA_DIR: "/var/lib/bpcp"
  AUTH_SERVICE_URL: "http://auth-microservice.statex-apps.svc.cluster.local:3370"
  LOGGING_SERVICE_URL: "http://logging-microservice.statex-apps.svc.cluster.local:3367"
  MONITORING_SERVICE_URL: "http://monitoring-microservice.statex-apps.svc.cluster.local:3368"
  BPCP_EVENT_BUS_ENABLED: "true"
  BPCP_EVENTS_EXCHANGE: "bpcp.events"
  BPCP_EVENTS_ROUTING_KEY_PREFIX: "bpcp.process"
  BPCP_EVENT_BUS_PUBLISH_TIMEOUT_MS: "5000"
