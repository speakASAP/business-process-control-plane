apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: business-process-control-plane-secret
  namespace: statex-apps
  labels:
    app: business-process-control-plane
    managed-by: codex
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: business-process-control-plane-secret
    creationPolicy: Owner
  data:
    - secretKey: BPCP_EVENT_BUS_URL
      remoteRef:
        key: secret/prod/runlayer
        property: RABBITMQ_URL
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: secret/prod/runlayer
        property: RABBITMQ_URL
    - secretKey: BPCP_PROCESS_SIGNING_SECRET
      remoteRef:
        key: secret/prod/business-process-control-plane
        property: BPCP_PROCESS_SIGNING_SECRET
