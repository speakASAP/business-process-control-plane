apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-process-control-plane
  namespace: statex-apps
  labels:
    app: business-process-control-plane
    managed-by: codex
    component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: business-process-control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: business-process-control-plane
        component: control-plane
    spec:
      containers:
        - name: app
          image: localhost:5000/business-process-control-plane:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3375
              name: http
          envFrom:
            - configMapRef:
                name: business-process-control-plane-config
            - secretRef:
                name: business-process-control-plane-secret
          volumeMounts:
            - name: process-data
              mountPath: /var/lib/bpcp
          startupProbe:
            httpGet:
              path: /health
              port: 3375
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3375
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3375
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: process-data
          persistentVolumeClaim:
            claimName: business-process-control-plane-data
